<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Café · Оценка успешности</title>
    <meta name="description" content="Интерфейс для оценки потенциальной успешности предприятия общественного питания." />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=boska@500,700&display=swap" rel="stylesheet">
    <style>
        :root, [data-theme="light"] {
            --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
            --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
            --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
            --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
            --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
            --space-1: .25rem; --space-2: .5rem; --space-3: .75rem; --space-4: 1rem;
            --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
            --space-12: 3rem; --space-16: 4rem;
            --color-bg:#f7f3ef; --color-surface:#fcfaf7; --color-surface-2:#f2ece6;
            --color-border:#d8cec4; --color-text:#2d2118; --color-text-muted:#6f655d;
            --color-primary:#6f4e37; --color-primary-hover:#573a27; --color-accent:#c08a5b;
            --color-success:#3f6b46; --color-danger:#9e3f3f; --color-text-inverse:#fffaf5;
            --radius-sm:.5rem; --radius-md:.85rem; --radius-lg:1.25rem; --radius-full:9999px;
            --shadow-sm: 0 6px 20px rgba(64,38,18,.08); --shadow-md: 0 18px 42px rgba(64,38,18,.12);
            --font-body:'Satoshi', Inter, sans-serif; --font-display:'Boska', Georgia, serif;
        }
        [data-theme="dark"] {
            --color-bg:#181311; --color-surface:#231c18; --color-surface-2:#2d2520;
            --color-border:#4a3c34; --color-text:#f2e9df; --color-text-muted:#b8ab9e;
            --color-primary:#c08a5b; --color-primary-hover:#d6a477; --color-accent:#8b5e3c;
            --color-success:#7ec08a; --color-danger:#d97f7f; --color-text-inverse:#1a1412;
            --shadow-sm: 0 6px 20px rgba(0,0,0,.25); --shadow-md: 0 18px 42px rgba(0,0,0,.35);
        }
        *,*::before,*::after{box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{margin:0; min-height:100vh; font-family:var(--font-body); background:linear-gradient(180deg,var(--color-bg),var(--color-surface-2)); color:var(--color-text); line-height:1.6}
        button,input,select,textarea{font:inherit}
        .shell{max-width:1180px;margin:0 auto;padding:var(--space-4)}
        .topbar{display:flex;justify-content:space-between;align-items:center;gap:var(--space-4);padding:var(--space-4) 0}
        .brand{display:flex;align-items:center;gap:.8rem;font-weight:700}
        .brand svg{width:38px;height:38px;color:var(--color-primary)}
        .brand span{font-size:var(--text-lg)}
        .hero{display:grid;grid-template-columns:1.15fr .85fr;gap:var(--space-8);align-items:start;padding:var(--space-8) 0 var(--space-12)}
        .hero-copy h1{font-family:var(--font-display);font-size:var(--text-2xl);line-height:1.02;margin:0 0 var(--space-4)}
        .hero-copy p{font-size:var(--text-base);color:var(--color-text-muted);max-width:58ch;margin:0 0 var(--space-6)}
        .panel{background:color-mix(in srgb, var(--color-surface) 94%, transparent);border:1px solid var(--color-border);border-radius:calc(var(--radius-lg) + 2px);box-shadow:var(--shadow-md)}
        .form-panel{padding:var(--space-6)}
        .panel h2{margin:0 0 var(--space-2);font-size:var(--text-xl)}
        form{display:grid;gap:var(--space-4)}
        .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--space-4)}
        .field{display:grid;gap:.45rem}
        label{font-size:var(--text-sm);font-weight:700}
        select{width:100%;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);border-radius:var(--radius-md);padding:.9rem 1rem;min-height:48px;outline:none}
        .actions{display:flex;flex-wrap:wrap;gap:var(--space-3);padding-top:var(--space-2)}
        .btn{min-height:48px;padding:.9rem 1.2rem;border-radius:var(--radius-full);border:none;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:.6rem;cursor:pointer}
        .btn-primary{background:var(--color-primary);color:var(--color-text-inverse)}
        .btn-secondary{background:transparent;border:1px solid var(--color-border);color:var(--color-text)}
        .summary{padding:var(--space-6);display:grid;gap:var(--space-4)}
        .summary-card{background:var(--color-surface-2);border:1px solid var(--color-border);padding:var(--space-4);border-radius:var(--radius-lg)}
        .lang-toggle{position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 100;}
        @media (max-width: 900px){.hero{grid-template-columns:1fr}.grid-2{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="shell" id="app">
        <header class="topbar">
            <div class="brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
                <span data-i18n="brand">Café Success</span>
            </div>
            <button class="btn btn-secondary" data-theme-toggle>◐</button>
        </header>

        <main class="hero">
            <div class="hero-copy">
                <h1 data-i18n="hero-title">Оценка потенциальной успешности</h1>
                <p data-i18n="hero-desc">Введите параметры вашего заведения для расчета вероятности успеха с помощью системы нечеткой логики.</p>
            </div>

            <section class="panel form-panel">
                <h2 data-i18n="form-title">Параметры заведения</h2>
                <form id="evaluationForm">
                    <div class="grid-2">
                        <div class="field">
                            <label data-i18n="label-type">Тип заведения</label>
                            <select id="type" required>
                                <option value="" data-i18n="opt-select">Выберите...</option>
                                <option value="coffee" data-i18n="opt-type-1">Кофейня</option>
                                <option value="fastfood" data-i18n="opt-type-2">Фастфуд</option>
                                <option value="family" data-i18n="opt-type-3">Семейный ресторан</option>
                                <option value="author" data-i18n="opt-type-4">Авторская кухня</option>
                                <option value="pizza" data-i18n="opt-type-5">Пиццерия</option>
                                <option value="sushi" data-i18n="opt-type-6">Суши-бар</option>
                                <option value="burger" data-i18n="opt-type-7">Бургерная</option>
                            </select>
                        </div>
                        <div class="field">
                            <label data-i18n="label-location">Локация</label>
                            <select id="location" required>
                                <option value="" data-i18n="opt-select">Выберите...</option>
                                <option value="center" data-i18n="opt-loc-1">Центр</option>
                                <option value="residential" data-i18n="opt-loc-2">Спальный район</option>
                                <option value="business" data-i18n="opt-loc-3">Деловой квартал</option>
                                <option value="metro" data-i18n="opt-loc-4">У метро</option>
                                <option value="shopping" data-i18n="opt-loc-5">Торговая улица</option>
                                <option value="alley" data-i18n="opt-loc-6">Переулок</option>
                                <option value="station" data-i18n="opt-loc-7">Вокзал</option>
                                <option value="airport" data-i18n="opt-loc-8">Аэропорт</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="grid-2">
                        <div class="field">
                            <label data-i18n="label-competitors">Конкуренты</label>
                            <select id="competitors" required>
                                <option value="0">0</option>
                                <option value="1-2">1–2</option>
                                <option value="3-5">3–5</option>
                                <option value=">5">> 5</option>
                            </select>
                        </div>
                        <div class="field">
                            <label data-i18n="label-parking">Парковка</label>
                            <select id="parking" required>
                                <option value="none" data-i18n="opt-park-1">Отсутствует</option>
                                <option value="paid" data-i18n="opt-park-2">Платная</option>
                                <option value="free" data-i18n="opt-park-3">Бесплатная</option>
                            </select>
                        </div>
                    </div>

                    <div class="field">
                        <label data-i18n="label-entrance">Тип входа</label>
                        <select id="entrance" required>
                            <option value="street" data-i18n="opt-ent-1">С улицы</option>
                            <option value="mall" data-i18n="opt-ent-2">Внутри ТЦ</option>
                            <option value="arch" data-i18n="opt-ent-3">Через арку</option>
                            <option value="basement" data-i18n="opt-ent-4">Цокольный этаж</option>
                            <option value="2nd" data-i18n="opt-ent-5">Второй этаж</option>
                            <option value="above" data-i18n="opt-ent-6">Выше второго этажа</option>
                        </select>
                    </div>

                    <div class="grid-2">
                        <div class="field">
                            <label data-i18n="label-check">Средний чек</label>
                            <select id="check" required>
                                <option value="low" data-i18n="opt-check-1">Низкий (<500₽)</option>
                                <option value="medium" data-i18n="opt-check-2">Средний (500–1500₽)</option>
                                <option value="high" data-i18n="opt-check-3">Высокий (1500–3000₽)</option>
                                <option value="premium" data-i18n="opt-check-4">Премиум (>3000₽)</option>
                            </select>
                        </div>
                        <div class="field">
                            <label data-i18n="label-anchor">Якорь</label>
                            <select id="anchor" required>
                                <option value="none" data-i18n="opt-anch-1">Нет</option>
                                <option value="mall" data-i18n="opt-anch-2">ТЦ</option>
                                <option value="bc" data-i18n="opt-anch-3">Бизнес-центр</option>
                                <option value="uni" data-i18n="opt-anch-4">Университет</option>
                                <option value="college" data-i18n="opt-anch-5">Колледж</option>
                                <option value="metro" data-i18n="opt-anch-6">Метро</option>
                                <option value="tourist" data-i18n="opt-anch-7">Туристический объект</option>
                            </select>
                        </div>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn btn-primary" data-i18n="btn-calc">Рассчитать вероятность</button>
                    </div>
                </form>

                <div class="summary" style="margin-top: 20px;">
                    <div class="summary-card">
                        <h3 data-i18n="res-title">Результат оценки</h3>
                        <strong id="resultDisplay" data-i18n="res-placeholder">Ожидание ввода...</strong>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div class="lang-toggle">
        <button class="btn btn-secondary" onclick="setLang('ru')">RU</button>
        <button class="btn btn-secondary" onclick="setLang('es')">ES</button>
    </div>

    <script>
        const translations = {
            ru: {
                "brand": "Café Success",
                "hero-title": "Оценка потенциальной успешности",
                "hero-desc": "Введите параметры вашего заведения для расчета вероятности успеха с помощью системы нечеткой логики.",
                "form-title": "Параметры заведения",
                "label-type": "Тип заведения",
                "label-location": "Локация",
                "label-competitors": "Конкуренты",
                "label-parking": "Парковка",
                "label-entrance": "Тип входа",
                "label-check": "Средний чек",
                "label-anchor": "Якорь",
                "opt-select": "Выберите...",
                "opt-type-1": "Кофейня", "opt-type-2": "Фастфуд", "opt-type-3": "Семейный ресторан", "opt-type-4": "Авторская кухня", "opt-type-5": "Пиццерия", "opt-type-6": "Суши-бар", "opt-type-7": "Бургерная",
                "opt-loc-1": "Центр", "opt-loc-2": "Спальный район", "opt-loc-3": "Деловой квартал", "opt-loc-4": "У метро", "opt-loc-5": "Торговая улица", "opt-loc-6": "Переулок", "opt-loc-7": "Вокзал", "opt-loc-8": "Аэропорт",
                "opt-park-1": "Отсутствует", "opt-park-2": "Платная", "opt-park-3": "Бесплатная",
                "opt-ent-1": "С улицы", "opt-ent-2": "Внутри ТЦ", "opt-ent-3": "Через арку", "opt-ent-4": "Цокольный этаж", "opt-ent-5": "Второй этаж", "opt-ent-6": "Выше второго этажа",
                "opt-check-1": "Низкий (<500₽)", "opt-check-2": "Средний (500-1500₽)", "opt-check-3": "Высокий (1500-3000₽)", "opt-check-4": "Премиум (>3000₽)",
                "opt-anch-1": "Нет", "opt-anch-2": "ТЦ", "opt-anch-3": "Бизнес-центр", "opt-anch-4": "Университет", "opt-anch-5": "Колледж", "opt-anch-6": "Метро", "opt-anch-7": "Туристический объект",
                "btn-calc": "Рассчитать вероятность",
                "res-title": "Результат оценки",
                "res-placeholder": "Ожидание ввода...",
                "res-success": "Вероятность успеха рассчитана (демо)"
            },
            es: {
                "brand": "Café Éxito",
                "hero-title": "Evaluación de Éxito Potencial",
                "hero-desc": "Ingrese los parámetros de su establecimiento para calcular la probabilidad de éxito mediante lógica difusa.",
                "form-title": "Parámetros del Local",
                "label-type": "Tipo de local",
                "label-location": "Ubicación",
                "label-competitors": "Competidores",
                "label-parking": "Estacionamiento",
                "label-entrance": "Tipo de entrada",
                "label-check": "Ticket promedio",
                "label-anchor": "Ancla",
                "opt-select": "Seleccione...",
                "opt-type-1": "Cafetería", "opt-type-2": "Comida rápida", "opt-type-3": "Restaurante familiar", "opt-type-4": "Cocina de autor", "opt-type-5": "Pizzería", "opt-type-6": "Sushi bar", "opt-type-7": "Hamburguesería",
                "opt-loc-1": "Centro", "opt-loc-2": "Residencial", "opt-loc-3": "Distrito negocios", "opt-loc-4": "Cerca metro", "opt-loc-5": "Calle comercial", "opt-loc-6": "Callejón", "opt-loc-7": "Estación", "opt-loc-8": "Aeropuerto",
                "opt-park-1": "Inexistente", "opt-park-2": "De pago", "opt-park-3": "Gratuito",
                "opt-ent-1": "Desde calle", "opt-ent-2": "Dentro de CC", "opt-ent-3": "Por arco", "opt-ent-4": "Semisótano", "opt-ent-5": "Segundo piso", "opt-ent-6": "Piso superior",
                "opt-check-1": "Bajo (<500₽)", "opt-check-2": "Medio (500-1500₽)", "opt-check-3": "Alto (1500-3000₽)", "opt-check-4": "Premium (>3000₽)",
                "opt-anch-1": "Ninguna", "opt-anch-2": "Centro comercial", "opt-anch-3": "Business center", "opt-anch-4": "Universidad", "opt-anch-5": "Colegio", "opt-anch-6": "Metro", "opt-anch-7": "Atracción turística",
                "btn-calc": "Calcular probabilidad",
                "res-title": "Resultado de la evaluación",
                "res-placeholder": "Esperando datos...",
                "res-success": "Probabilidad calculada (demo)"
            }
        };

        function setLang(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.textContent = translations[lang][key];
            });
            document.documentElement.lang = lang;
        }

        // Default to Russian
        setLang('ru');

        // Theme toggle
        const root = document.documentElement;
        const toggle = document.querySelector('[data-theme-toggle]');
        let theme = 'light';
        toggle.addEventListener('click', () => {
            theme = theme === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', theme);
        });

        // Form handling
        document.getElementById('evaluationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const lang = document.documentElement.lang;
            document.getElementById('resultDisplay').textContent = translations[lang]['res-success'];
        });
    </script>
</body>
</html>
