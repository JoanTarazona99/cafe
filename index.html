<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería - Entrada de Datos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }
        .dark {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
        }
        body { background-color: var(--bg-color); color: var(--text-main); transition: all 0.3s; }
        .card { background-color: var(--card-bg); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold flex items-center gap-2">
                <i class="fas fa-coffee text-amber-600"></i>
                Café Data Entry
            </h1>
            <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>
        </header>

        <div class="grid md:grid-cols-3 gap-8">
            <!-- Formulario -->
            <div class="md:col-span-2 space-y-6">
                <div class="card p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
                    <h2 class="text-xl font-semibold mb-4">Nuevo Pedido</h2>
                    <form id="orderForm" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-sm font-medium">Cliente</label>
                                <input type="text" placeholder="Nombre del cliente" class="w-full p-2 rounded-lg border border-slate-300 dark:bg-slate-800 dark:border-slate-600 outline-none focus:ring-2 focus:ring-amber-500">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-medium">Tipo de Café</label>
                                <select class="w-full p-2 rounded-lg border border-slate-300 dark:bg-slate-800 dark:border-slate-600 outline-none focus:ring-2 focus:ring-amber-500">
                                    <option>Espresso</option>
                                    <option>Americano</option>
                                    <option>Latte</option>
                                    <option>Capuccino</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-sm font-medium">Precio ($)</label>
                                <input type="number" step="0.01" class="w-full p-2 rounded-lg border border-slate-300 dark:bg-slate-800 dark:border-slate-600 outline-none focus:ring-2 focus:ring-amber-500">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-medium">Cantidad</label>
                                <input type="number" value="1" min="1" class="w-full p-2 rounded-lg border border-slate-300 dark:bg-slate-800 dark:border-slate-600 outline-none focus:ring-2 focus:ring-amber-500">
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-amber-200 dark:shadow-none">
                            Registrar Venta
                        </button>
                    </form>
                </div>

                <div class="card p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
                    <h2 class="text-xl font-semibold mb-4">Registros Recientes</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="border-b border-slate-200 dark:border-slate-700 text-slate-500">
                                    <th class="py-2">Hora</th>
                                    <th class="py-2">Cliente</th>
                                    <th class="py-2">Producto</th>
                                    <th class="py-2">Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="py-3 text-sm">14:20</td>
                                    <td>Ana García</td>
                                    <td>Latte</td>
                                    <td class="font-bold">$4.50</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Resumen -->
            <div class="space-y-6">
                <div class="card p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 bg-amber-50 dark:bg-slate-800">
                    <h2 class="text-lg font-bold mb-4">Ventas del Día</h2>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-slate-500">Total Recaudado</span>
                            <span class="text-2xl font-black text-amber-600">$128.50</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-500">Pedidos Totales</span>
                            <span class="text-xl font-bold">24</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
        });
    </script>
</body>
</html>
